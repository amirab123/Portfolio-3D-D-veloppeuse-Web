<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amira | Portfolio</title>


  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }

    .perspective { perspective: 1200px; }

    .card-3d {
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card-3d:hover {
      transform: rotateY(15deg) rotateX(10deg) scale(1.05);
    }

    .card-content { transform: translateZ(40px); }

    .glow {
      box-shadow: 0 0 20px rgba(255,255,0,0.6);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 text-white">

  <!-- HERO -->
  <section class="text-center py-20">
    <h1 class="text-5xl md:text-6xl font-bold">
      👋 Salut, moi c’est <span class="text-yellow-300">Amira</span>
    </h1>

    <p class="mt-6 text-xl text-gray-200">
      Développeuse Web 💻 | 3D 🎨 | Style Cartoon ✨
    </p>
  </section>

  <section class="px-10 pb-20 perspective grid md:grid-cols-3 gap-10">

    <div class="card-3d bg-indigo-800 p-6 rounded-3xl glow">
      <div class="card-content">
        <h2 class="text-2xl font-bold">🛒 E-commerce</h2>
        <p>Angular + Spring Boot</p>
      </div>
    </div>

    <div class="card-3d bg-purple-700 p-6 rounded-3xl glow">
      <div class="card-content">
        <h2 class="text-2xl font-bold">🏠 Réservation</h2>
        <p>Application React</p>
      </div>
    </div>

    <div class="card-3d bg-pink-600 p-6 rounded-3xl glow">
      <div class="card-content">
        <h2 class="text-2xl font-bold">🎨 Portfolio 3D</h2>
        <p>HTML + Tailwind</p>
      </div>
    </div>

  </section>

  <!-- COMPETENCES -->
  <section class="text-center py-20 bg-black bg-opacity-30">
    <h2 class="text-4xl font-bold mb-10">⚡ Compétences</h2>

    <div class="flex flex-wrap justify-center gap-4">
      <span class="bg-indigo-600 px-4 py-2 rounded-full">HTML</span>
      <span class="bg-indigo-600 px-4 py-2 rounded-full">CSS</span>
      <span class="bg-purple-600 px-4 py-2 rounded-full">Angular</span>
      <span class="bg-pink-600 px-4 py-2 rounded-full">Spring Boot</span>
      <span class="bg-pink-600 px-4 py-2 rounded-full">MySQL</span>
    </div>
  </section>


  <section class="text-center py-20 bg-black bg-opacity-40">
    <h2 class="text-4xl font-bold mb-6">📩 Contact</h2>

    <form id="contact-form" class="max-w-xl mx-auto space-y-4">

      <input type="text" name="name" placeholder="Ton nom"
        class="w-full p-3 rounded-lg text-black" required>

      <input type="email" name="email" placeholder="Ton email"
        class="w-full p-3 rounded-lg text-black" required>

      <textarea name="message" placeholder="Ton message"
        class="w-full p-3 rounded-lg text-black" required></textarea>

      <button type="submit"
        class="bg-yellow-400 text-black px-8 py-3 rounded-full font-semibold hover:scale-110 transition">
        Envoyer 🚀
      </button>

    </form>

    <p id="status" class="mt-4"></p>
  </section>


  <footer class="text-center py-6 text-gray-300">
    © 2026 Amira — Portfolio 3D Cartoon ✨
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    (function(){
      emailjs.init("TON_PUBLIC_KEY"); // 🔑 remplacer
    })();

    const form = document.getElementById("contact-form");
    const status = document.getElementById("status");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      status.innerHTML = "⏳ Envoi en cours...";

      emailjs.sendForm(
        "TON_SERVICE_ID",
        "TON_TEMPLATE_ID",
        this
      )
      .then(() => {
        status.innerHTML = "✅ Message envoyé avec succès !";
        form.reset();
      })
      .catch(() => {
        status.innerHTML = "❌ Erreur, réessaie.";
      });
    });
  </script>

</body>
</html>
